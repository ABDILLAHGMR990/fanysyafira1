<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Letter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="particles"></div>

<div class="container" id="giftBox">
  <div class="gift">🎁</div>
  <p>tap to open 💖</p>
</div>

<div class="letter hidden" id="letterPage">

  <h1>a love letter in bloom</h1>

  <div class="music-card">
    <img src="foto1.jpg" alt="album">

    <div class="music-info">
      <h2>My Favorite Song</h2>
      <p>for you 💕</p>

      <audio id="bgMusic" autoplay loop controls>
        <source src="music.mp3" type="audio/mp3">
      </audio>
    </div>
  </div>

  <div class="text-box">
    <p>
     "Bertemu denganmu adalah takdir, menjadi sahabatmu adalah pilihan, 
      namun jatuh cinta kepadamu di luar kendaliku.".
    </p>
  </div>

  <div class="gallery">
    <img src="foto1.jpg">
    <img src="foto2.jpg">
    <img src="foto3.jpg">
    <img src="foto4.jpg">
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
